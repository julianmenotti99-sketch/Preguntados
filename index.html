<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Mini Preguntados</title>
  <style>
    body {
      font-family: Arial;
      background: #121212;
      color: white;
      text-align: center;
      padding: 20px;
    }

    .pregunta {
      margin-bottom: 20px;
    }

    button {
      margin: 5px;
      padding: 10px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
    }

    .correcto {
      background-color: green;
      color: white;
    }

    .incorrecto {
      background-color: red;
      color: white;
    }

    #resultado {
      margin-top: 20px;
      font-size: 20px;
    }

    #premio {
      margin-top: 30px;
      font-size: 22px;
      color: gold;
      display: none;
    }
  </style>
</head>
<body>

  <h1>🎮 Mini Preguntados</h1>

  <div id="quiz"></div>

  <button onclick="mostrarResultado()">Ver resultado</button>

  <div id="resultado"></div>
  <div id="premio"></div>

<script>
const preguntas = [
  {
    pregunta: "¿de que color era el caballo blanco de asn martin?",
    opciones: ["Marron", "negro", "Blanco"],
    correcta: "Blanco"
  },
    {
    pregunta: "¿si 2 y 2 son 4, 4 y 2 son 6, 6 y 2 son 8 y 8?",
    opciones: ["12", "14", "16"],
    correcta: "16"
  },
  {
    pregunta: "¿Cuál es la capital de Argentina?",
    opciones: ["Córdoba", "Buenos Aires", "Rosario"],
    correcta: "Buenos Aires"
  },
  {
    pregunta: "¿Cuánto es 5 + 3?",
    opciones: ["6", "8", "10"],
    correcta: "8"
  },
  {
    pregunta: "¿Qué planeta es el más grande?",
    opciones: ["Marte", "Júpiter", "Venus"],
    correcta: "Júpiter"
  },
  {
    pregunta: "¿quien ganó en el super clásico y final de la libertadores entre river y boca en diciembre de 2018?",
    opciones: ["boca", "river"],
    correcta: "river"
  }
];

let respuestasUsuario = [];

const quizDiv = document.getElementById("quiz");

preguntas.forEach((p, index) => {
  let div = document.createElement("div");
  div.classList.add("pregunta");

  let titulo = document.createElement("h3");
  titulo.innerText = p.pregunta;

  div.appendChild(titulo);

  p.opciones.forEach(op => {
    let btn = document.createElement("button");
    btn.innerText = op;

    btn.onclick = () => {
      respuestasUsuario[index] = op;

      let botones = div.querySelectorAll("button");
      botones.forEach(b => b.classList.remove("correcto", "incorrecto"));

      if (op === p.correcta) {
        btn.classList.add("correcto");
      } else {
        btn.classList.add("incorrecto");
      }

      // Si es la última pregunta y responde bien → mostrar premio
      if (index === preguntas.length - 1 && op === p.correcta) {
        let premio = document.getElementById("premio");
        premio.style.display = "block";
        premio.innerText = "🎉 Mi Bombona Has ganado una entrada y viaje para ver a River Plate el 3 de Mayo 🎉";
      }
    };

    div.appendChild(btn);
  });

  quizDiv.appendChild(div);
});

function mostrarResultado() {
  let correctas = 0;

  preguntas.forEach((p, i) => {
    if (respuestasUsuario[i] === p.correcta) {
      correctas++;
    }
  });

  document.getElementById("resultado").innerText =
    "Respondiste bien " + correctas + " de " + preguntas.length;
}
</script>

</body>
</html>
